# Production stack: app (api + workers) + Postgres + Redis.
services:
  app:
    image: ghcr.io/kisaesdevlab/darrow-time-invoicing:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/darrow_ti
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET}
      STORAGE_ROOT: /storage
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      NODE_ENV: production
      LOG_LEVEL: info
      SMTP_ENC_KEY: ${SMTP_ENC_KEY:-}
      PUBLIC_UPLOAD_TOKEN: ${PUBLIC_UPLOAD_TOKEN:-}
    ports: ['3000:3000']
    volumes: ['storage:/storage']
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: darrow_ti
    volumes: ['pgdata:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes: ['redisdata:/data']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  pgdata:
  redisdata:
  storage:
