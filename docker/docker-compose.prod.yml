# Production stack: app (api + workers) + Postgres + Redis + Caddy + Cloudflared.
#
# Tunnel flow:
#   1. Admin lands on the LAN UI at http://<host>:3000 (api/web served directly).
#   2. Settings → Remote access → enter Cloudflare API token → Verify.
#   3. Pick a zone + subdomain → click Provision.
#   4. The api writes /storage/cloudflared/tunnel.env (TUNNEL_TOKEN=…),
#      renders /storage/caddy/Caddyfile, reloads Caddy via :2019/load,
#      and restarts cloudflared via the Docker socket.
#   5. Public traffic now flows: Internet → Cloudflare edge → cloudflared
#      → Caddy:443 (self-signed; trusted via noTLSVerify) → app:3000.
services:
  app:
    image: ghcr.io/kisaesdevlab/vibe-job-proposals:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/darrow_ti
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET}
      STORAGE_ROOT: /storage
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      NODE_ENV: production
      LOG_LEVEL: info
      SMTP_ENC_KEY: ${SMTP_ENC_KEY:-}
      TUNNEL_ENC_KEY: ${TUNNEL_ENC_KEY:-}
      PUBLIC_UPLOAD_TOKEN: ${PUBLIC_UPLOAD_TOKEN:-}
      # Caddy admin endpoint + service-name hints used by the tunnel service.
      CADDY_ADMIN_URL: http://caddy:2019
      CADDY_API_HOST: app
      CADDY_API_PORT: '3000'
      CADDY_WEB_HOST: app
      CADDY_WEB_PORT: '3000'
      CLOUDFLARED_CONTAINER: cloudflared
    ports: ['3000:3000']
    volumes:
      - storage:/storage
      # Read-only docker socket so the api can restart cloudflared after
      # provisioning. Required for the Settings → Remote access workflow.
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Caddy + cloudflared are opt-in. Default `docker compose up -d` brings up
  # only app + Postgres + Redis (LAN access on :3000). To enable the public
  # tunnel workflow, run `docker compose --profile tunnel up -d` after
  # provisioning a tunnel from Settings → Remote access. We gate these
  # services because:
  #   - Caddy's command points at /storage/caddy/Caddyfile which doesn't
  #     exist until the api writes one during tunnel provisioning, so
  #     auto-start would put Caddy in a restart loop on first install.
  #   - cloudflared:latest is a scratch image with no /bin/sh, and the
  #     entrypoint here uses a shell wrapper to read the token from the
  #     shared volume — same boot loop on a fresh install.
  caddy:
    profiles: ['tunnel']
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      app: { condition: service_healthy }
    volumes:
      # Bind the directory (not the file) so atomic Caddyfile rename
      # re-resolves the inode without a container restart.
      - storage:/storage:ro
      - caddy_data:/data
      - caddy_config:/config
    # Caddy looks for /etc/caddy/Caddyfile by default; we point it at the
    # one written by the api into the shared /storage volume.
    command: ['caddy', 'run', '--config', '/storage/caddy/Caddyfile', '--adapter', 'caddyfile']
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:2019/config/']
      interval: 15s
      timeout: 3s
      retries: 5

  # cloudflared is fully managed by the api via dockerode (it stops + recreates
  # the container with TUNNEL_TOKEN injected as an env var when you provision
  # from Settings → Remote access). The compose definition is kept only so
  # `docker compose --profile tunnel down` cleans up after disable. The
  # container never auto-starts here — the image is scratch (no /bin/sh) and
  # the api owns its lifecycle.
  cloudflared:
    profiles: ['tunnel']
    image: cloudflare/cloudflared:latest
    restart: 'no'
    command: ['tunnel', '--no-autoupdate', 'run']
    environment:
      TUNNEL_TOKEN: '${TUNNEL_TOKEN:-}'

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: darrow_ti
    volumes: ['pgdata:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes: ['redisdata:/data']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  pgdata:
  redisdata:
  storage:
  caddy_data:
  caddy_config:
